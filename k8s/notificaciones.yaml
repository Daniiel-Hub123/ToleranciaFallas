# Manifiesto Kubernetes para el servicio de notificaciones
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificaciones
  template:
    metadata:
      labels:
        app: notificaciones
    spec:
      nodeSelector:
        kubernetes.io/hostname: minikube-m02
      containers:
      - name: notificaciones
        image: toleraciafallas/notificaciones:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones-service
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: notificaciones