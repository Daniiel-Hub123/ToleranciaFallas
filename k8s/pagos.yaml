# Manifiesto Kubernetes para el servicio de pagos
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagos-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pagos
  template:
    metadata:
      labels:
        app: pagos
    spec:
      containers:
      - name: pagos
        image: toleraciafallas/pagos:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: pagos-service
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: pagos